version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airank
      POSTGRES_PASSWORD: airank_secret
      POSTGRES_DB: airank
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airank"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://airank:airank_secret@db:5432/airank
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-to-a-random-secret-in-production
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build: .
    command: npx prisma db push --accept-data-loss
    environment:
      DATABASE_URL: postgresql://airank:airank_secret@db:5432/airank
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
